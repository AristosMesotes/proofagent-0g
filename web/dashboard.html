<!DOCTYPE html>
<!--
  ProofAgent-0G -- the interactive Verification Console (design §3 IA, §4 components, §5 flows, §8 honesty).

  P1 IA SHELL + the FOUR proof cards: a sticky header rail + a read-only own-RPC network pill; the
  at-a-glance reconciliation rollup strip; the responsive auto-fit card grid with the four proof cards --
  NEG (-> UNVERIFIED), BRAIN (honest PENDING, never green here), RAILS (-> OVER_TX_CAP), SETTLEMENT
  (-> SETTLED); each card is a three-altitude verdict block + a "reconciled vs an independent source"
  badge. Live reads ENRICH on load; they never block first paint. The playground, the live feed, and the
  evidence drawer arrive in later phases. The original demo page remains index.html (untouched).

  Offline + static: no framework, no CDN, no network. The page loads the compiled ESM at dist/dashboard.js
  (build it with `npm run build` in this directory). Honesty: only live/settled is green; the BRAIN card
  is never green here (its green flip is operator-gated, on a real attestation); a reconciliation badge
  goes green ONLY from an independent re-read that agrees -- never from the UI's own state.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProofAgent-0G -- Verification Console</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <!-- The dashboard mounts here. Rendered by dashboard.ts from the spine-derived model. -->
      <div id="dashboard" aria-label="ProofAgent-0G verification console">
        <noscript>
          <p class="noscript">
            This verification console renders with a small offline script. Enable JavaScript, or open
            <a href="./index.html">the working proof page</a> (three proofs + the NEG case), or read
            <code>docs/PROOFAGENT_0G_DESIGN.md</code> &sect;2 for the three proofs.
          </p>
        </noscript>
      </div>
    </main>

    <!-- The compiled, offline ESM. No bundler, no CDN. Build with `npm run build` (tsc). -->
    <script type="module" src="./dist/dashboard.js"></script>
  </body>
</html>
